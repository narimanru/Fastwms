<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="180" height="180" rx="40" fill="url(#gradient)"/>
  
  <!-- Warehouse/Box icon with modern style -->
  <g transform="translate(35, 45)">
    <!-- Top box -->
    <path d="M55 10 L27.5 0 L0 10 L0 22 L27.5 32 L55 22 Z" fill="#22d3ee" opacity="0.8"/>
    <path d="M0 22 L0 44 L27.5 54 L27.5 32 Z" fill="#06b6d4"/>
    <path d="M55 22 L55 44 L27.5 54 L27.5 32 Z" fill="#0891b2"/>
    
    <!-- Bottom box -->
    <path d="M55 48 L27.5 38 L0 48 L0 60 L27.5 70 L55 60 Z" fill="#22d3ee" opacity="0.6"/>
    <path d="M0 60 L0 82 L27.5 92 L27.5 70 Z" fill="#06b6d4" opacity="0.9"/>
    <path d="M55 60 L55 82 L27.5 92 L27.5 70 Z" fill="#0891b2" opacity="0.9"/>
    
    <!-- Fast indicator - Lightning bolt -->
    <path d="M82 28 L72 44 L80 44 L68 66 L80 50 L72 50 L82 28" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  </g>
  
  <!-- Letter 'F' badge in corner -->
  <circle cx="140" cy="40" r="22" fill="#8b5cf6"/>
  <text x="140" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">F</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
</svg>
